name: Pull Request
description: Submit a pull request with Jira ticket integration
title: "[Brief description of changes]"
labels: []
body:
  - type: input
    id: jira_ticket
    attributes:
      label: Jira Ticket
      description: Enter the Jira ticket number (e.g., RHCLOUD-1234)
      placeholder: "RHCLOUD-1234"
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Description
      description: Provide a brief description of the changes in this PR
      placeholder: What does this PR do?
    validations:
      required: true

  - type: dropdown
    id: change_type
    attributes:
      label: Type of Change
      description: What type of change is this?
      options:
        - Bug fix
        - New feature
        - Breaking change
        - Documentation update
        - Refactoring
        - Performance improvement
    validations:
      required: true

  - type: textarea
    id: testing
    attributes:
      label: Testing
      description: Describe how you tested these changes
      placeholder: |
        - Tested scenario 1
        - Tested scenario 2
    validations:
      required: false

  - type: checkboxes
    id: checklist
    attributes:
      label: Checklist
      description: Confirm the following before submitting
      options:
        - label: My code follows the project's style guidelines
          required: false
        - label: I have performed a self-review of my code
          required: false
        - label: I have commented my code where necessary
          required: false
        - label: I have updated the documentation accordingly
          required: false
        - label: My changes generate no new warnings
          required: false
        - label: I have added tests that prove my fix works
          required: false
